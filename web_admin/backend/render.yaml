services:
  - type: web
    name: nutrivision-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nutrivision-db
          property: connectionString

databases:
  - name: nutrivision-db
    plan: free
